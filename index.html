<!DOCTYPE html>
<html>
<head>
    <title>il tempo GLOBAL</title>
    <script src="https://www.webglearth.com/v2/api.js"></script>
    
    <style>
        /* Smooth moving background animation */
        @keyframes drift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505; 
            background-image: url('images/background.jpg');
            background-size: 130% 130%; 
            animation: drift 30s ease-in-out infinite; 
            overflow-x: hidden; 
            font-family: sans-serif;
            height: 150vh; 
        }

        /* Heading Style */
        h1 {
            font-size: 60px; 
            text-align: center; 
            margin-top: 40px; 
            color: white; 
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9);
            margin-bottom: 10px;
        }

        /* Search Bar Container */
        .search-container {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Sleek Location Search Input */
        .search-box {
            padding: 15px 25px;
            width: 500px; 
            font-size: 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            outline: none;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: rgba(0, 255, 204, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* Coordinate Results Display */
        #search-result {
            text-align: center;
            color: #00ffcc; 
            font-size: 16px;
            height: 40px; 
            margin-bottom: 20px;
            text-shadow: 0px 0px 10px rgba(0, 255, 204, 0.5);
        }

        /* Earth Container Window */
        .globe-wrapper {
            position: relative;
            width: 90vw;
            margin: 0 auto;
        }

        /* 3D Earth Canvas Container */
        #globe-stage {
            width: 100%;
            height: 75vh;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 0px 50px rgba(0,0,0,0.8);
            background-color: black;
        }

        /* Glassmorphic Searchable Language Deck Panel */
        .language-deck {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid rgba(0, 255, 204, 0.3);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            width: 230px;
        }

        .language-deck h3 {
            margin: 0 0 10px 0;
            color: #00ffcc;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Internal Language Filter input */
        .lang-search {
            width: 90%;
            padding: 8px 5%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 13px;
            margin-bottom: 10px;
            outline: none;
        }
        .lang-search:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }

        /* Scrollable container for complete language dropdown database list */
        .lang-list-container {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .lang-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .lang-list-container::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 204, 0.6);
            border-radius: 4px;
        }

        /* Language Buttons inside the dropdown list */
        .lang-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: 0.2s ease;
        }

        .lang-btn:hover {
            background: rgba(0, 255, 204, 0.2);
            border-color: #00ffcc;
            color: white;
        }

        .lang-btn.active {
            background: #00ffcc;
            color: #050505;
            font-weight: bold;
            border-color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>⫯𝘭 𝜏∈ⲙᕈ𝖮 Ꮆし〇ᗷᗩし</h1>

    <div class="search-container">
        <input type="text" class="search-box" id="locationInput" placeholder="Search villages, oceans, islands, or lat,lon...">
    </div>

    <div id="search-result"></div>

    <div class="globe-wrapper">
        <div id="globe-stage"></div>

        <div class="language-deck">
            <h3>Translation Matrix</h3>
            <input type="text" class="lang-search" id="langSearchBox" placeholder="Type language & press Enter..." onkeyup="filterLanguages()">
            <div class="lang-list-container" id="langContainer">
                </div>
        </div>
    </div>

    <script>
        // 1. Built-in Comprehensive Language Registry Database
        const GlobalLanguageDatabase = [
            { name: "English (Global Standard)", code: "en" },
            { name: "Español (Spanish)", code: "es" },
            { name: "Français (French)", code: "fr" },
            { name: "Deutsch (German)", code: "de" },
            { name: "Русский (Russian)", code: "ru" },
            { name: "Português (Portuguese)", code: "pt" },
            { name: "Italiano (Italian)", code: "it" },
            { name: "Türkçe (Turkish)", code: "tr" },
            { name: "Nederlands (Dutch)", code: "nl" },
            { name: "Polski (Polish)", code: "pl" },
            { name: "Svenska (Swedish)", code: "sv" },
            { name: "Dansk (Danish)", code: "da" },
            { name: "Suomi (Finnish)", code: "fi" },
            { name: "Norsk (Norwegian)", code: "no" },
            { name: "Català (Catalan)", code: "ca" },
            { name: "Română (Romanian)", code: "ro" },
            { name: "Magyar (Hungarian)", code: "hu" },
            { name: "Čeština (Czech)", code: "cs" },
            { name: "Slovenčina (Slovak)", code: "sk" },
            { name: "Local Autochthonous Matrix", code: "local" }
        ];

        // 2. Virtual Routing Domain Mask Execution
        try {
            var customURL = window.location.protocol + "//il-tempo-global/67711.com";
            window.history.pushState({ path: customURL }, '', customURL);
        } catch(e) {
            console.log("Virtual address mask mounted.");
        }

        // 3. Initialize 3D Engine with Premium 8K Satellite Graphics Array
        var earth = new WE.map('globe-stage', {
            atmosphere: true,
            center: [20, 0],
            zoom: 2,
            dragging: true,
            scrollWheelZoom: true
        });

        // 8K Ultra-Clarity Multi-Spectral Base Layer
        WE.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Premium 8K Satellite Data',
            maxZoom: 19,      
            tileSize: 512,     
            fading: false      
        }).addTo(earth);

        var textOverlayLayer;

        // 4. Stable Core Label Naming & Translation System Router
        function switchPlanetLanguage(langCode, buttonElement) {
            if (textOverlayLayer) {
                earth.removeLayer(textOverlayLayer);
            }

            if(buttonElement) {
                const buttons = document.querySelectorAll('.lang-btn');
                buttons.forEach(btn => btn.classList.remove('active'));
                buttonElement.classList.add('active');
            }

            var labelUrl;

            // Connects to bulletproof, live global transparency label endpoints
            if (langCode === 'en' || langCode === 'local') {
                // Carto Voyager Only Labels provides instant global English overlays at top speeds
                labelUrl = 'https://a.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}.png';
            } else {
                // Route international multi-regional transliteration matrix maps
                labelUrl = 'https://tile.openstreetmap.de/{z}/{x}/{y}.png';
            }

            textOverlayLayer = WE.tileLayer(labelUrl, {
                opacity: 0.85, 
                maxZoom: 18,
                tileSize: 256
            });
            
            textOverlayLayer.addTo(earth);
        }

        // 5. Mount Database array directly into UI list container components
        function loadLanguagesFromDatabase() {
            const container = document.getElementById('langContainer');
            container.innerHTML = ""; 

            GlobalLanguageDatabase.forEach((lang) => {
                const btn = document.createElement('button');
                btn.className = `lang-btn ${lang.code === 'en' ? 'active' : ''}`;
                btn.innerText = lang.name;
                btn.setAttribute('data-name', lang.name.toLowerCase());
                btn.onclick = function() {
                    switchPlanetLanguage(lang.code, btn);
                };
                container.appendChild(btn);
            });
        }

        // Initialize UI Elements
        loadLanguagesFromDatabase();
        switchPlanetLanguage('en', null);

        // 6. Language Dropdown Filtering & Enter Key Submission Monitor
        function filterLanguages() {
            var input = document.getElementById('langSearchBox').value.toLowerCase();
            var buttons = document.getElementById('langContainer').getElementsByClassName('lang-btn');
            
            for (var i = 0; i < buttons.length; i++) {
                var txtValue = buttons[i].getAttribute('data-name');
                if (txtValue.indexOf(input) > -1) {
                    buttons[i].style.display = "";
                } else {
                    buttons[i].style.display = "none";
                }
            }
        }

        // Triggers search selection activation immediately when hitting Enter inside the Language box
        document.getElementById('langSearchBox').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                var buttons = document.getElementById('langContainer').getElementsByClassName('lang-btn');
                // Target the first visible language that matched the filter criteria
                for (var i = 0; i < buttons.length; i++) {
                    if (buttons[i].style.display !== "none") {
                        buttons[i].click();
                        this.value = ""; // Clear input field
                        filterLanguages(); // Reset filters
                        break;
                    }
                }
            }
        });

        // 7. Global Geocoding Coordinate Tracker System
        const searchInput = document.getElementById('locationInput');
        const resultDisplay = document.getElementById('search-result');

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (!query) return;

                resultDisplay.style.color = "white";
                resultDisplay.innerText = "Scanning global matrix for: " + query + "...";

                const coordMatch = query.match(/^[-+]?([0-9]*\.[0-9]+|[0-9]+),\s*[-+]?([0-9]*\.[0-9]+|[0-9]+)$/);
                
                if (coordMatch) {
                    const parts = query.split(',');
                    const lat = parseFloat(parts[0]);
                    const lon = parseFloat(parts[1]);
                    
                    resultDisplay.style.color = "#00ffcc";
                    resultDisplay.innerHTML = `DIRECT COORDINATES LOCKED // <strong>LAT:</strong> ${lat}° | <strong>LON:</strong> ${lon}°`;
                    
                    earth.setView([lat, lon], 8);
                    return;
                }

                const apiUrl = `https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&q=${encodeURIComponent(query)}`;

                fetch(apiUrl, {
                    headers: { 'User-Agent': 'il-tempo-global-weather-app' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);
                        
                        const placeType = data[0].type.toUpperCase();
                        const displayName = data[0].display_name.split(',')[0]; 

                        resultDisplay.style.color = "#00ffcc";
                        resultDisplay.innerHTML = `${placeType} DETECTED: ${displayName} // <strong>LAT:</strong> ${lat.toFixed(4)}° | <strong>LON:</strong> ${lon.toFixed(4)}°`;
                        
                        earth.setView([lat, lon], 9);
                    } else {
                        resultDisplay.style.color = "#ff4444";
                        resultDisplay.innerText = "Location untraceable in global database.";
                    }
                })
                .catch(error => {
                    console.error("Geocoding Error:", error);
                    resultDisplay.style.color = "#ff4444";
                    resultDisplay.innerText = "Satellite database connection timeout.";
                });
            }
        });
    </script>
</body>
</html>
